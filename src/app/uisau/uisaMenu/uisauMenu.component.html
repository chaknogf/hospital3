<h2>Unidad de Información en Salud al Usuario (UISAU)</h2>
<div class="aurora-container">
  @for (opt of options; track opt) {
    <div
      class="aurora-cards"
      (click)="navegar(opt.ruta)"
      >
      <div class="aurora-items">
        <span [innerHTML]="icons[opt.icon]"></span>
        <h2>{{ opt.nombre }}</h2>
        <p>{{ opt.descripcion }}</p>
      </div>
    </div>
  }
</div>
