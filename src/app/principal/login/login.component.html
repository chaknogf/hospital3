<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mlogin">
  <div class="mlogin__group">
    <label class="mlogin__label">Usuario</label>
    <input
      type="text"
      class="mlogin__input"
      formControlName="username"
      placeholder="Ingrese su usuario"
      autocomplete="username"
    />
  </div>

  <div class="mlogin__group">
    <label class="mlogin__label">Contrasena</label>
    <input
      type="password"
      class="mlogin__input"
      formControlName="password"
      placeholder="Ingrese su contrasena"
      autocomplete="current-password"
    />
  </div>

  @if (errorMessage) {
    <div class="mlogin__error">
      {{ errorMessage }}
    </div>
  }

  <button type="submit" class="mlogin__btn" [disabled]="loading">
    @if (!loading) {
      Iniciar sesion
    } @else {
      Procesando...
    }
  </button>

  <button
    type="button"
    class="mlogin__forgot"
    (click)="reset()"
  >
    Olvidaste tu contrasena?
  </button>
</form>
