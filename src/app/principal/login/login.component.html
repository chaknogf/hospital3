<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mlogin">
  <div class="mlogin__group">
    <label class="mlogin__label">Usuario</label>
    <input
      type="text"
      class="mlogin__input"
      formControlName="username"
      placeholder="Ingrese su usuario"
    />
  </div>

  <div class="mlogin__group">
    <label class="mlogin__label">Contraseña</label>
    <input
      type="password"
      class="mlogin__input"
      formControlName="password"
      placeholder="Ingrese su contraseña"
    />
  </div>

  @if (errorMessage) {
    <div class="mlogin__error">
      {{ errorMessage }}
    </div>
  }

  <button type="submit" class="mlogin__btn" [disabled]="loading">
    @if (!loading) {
      Iniciar sesión
    } @else {
      Procesando...
    }
  </button>
</form>
