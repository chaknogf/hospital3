<section class="bg-stars">
  <span class="star"></span>
  <span class="star"></span>
  <span class="star"></span>
</section>

<div class="landing">
  <!-- Header -->
  <header class="landing-header">
    <div class="landing-header__brand">
      <span [innerHTML]="logoicon"></span>
      <span class="landing-header__title">MedicalApp</span>
    </div>
    <nav class="landing-header__nav">
      <a class="landing-header__link landing-header__link--active" href="#">Inicio</a>
      <a class="landing-header__link" href="#">Servicios</a>
      <a class="landing-header__link" href="#">Creditos</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="landing-hero">
    <div class="landing-hero__card">
      <h1 class="landing-hero__heading">
        Bienvenido a <span class="landing-hero__accent">MedicalApp</span>
      </h1>
      <p class="landing-hero__sub">
        Gestion de pacientes y expedientes electronicos modernos.
      </p>
      <div class="landing-hero__login">
        <app-login></app-login>
      </div>
    </div>

    <div class="landing-hero__illustration">
      <div [innerHTML]="svgHome"></div>
    </div>
  </section>
</div>
