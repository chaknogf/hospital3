<app-offline-banner></app-offline-banner>
<app-update-notification></app-update-notification>

<section class="bg-stars">
  <span class="star"></span>
  <span class="star"></span>
  <span class="star"></span>
</section>

<div class="sync-indicator" *ngIf="fullSync.isSyncing()">
  <div class="sync-spinner"></div>
</div>

<button class="sync-button btn btn-sm" *ngIf="!fullSync.isSyncing() && estaAutenticado"
        (click)="reSync()" title="Sincronizar datos offline">
  <i class="bi bi-arrow-repeat"></i>
</button>

<app-navbar
  [usuario]="username"
  [rol]="role"
  (cerrarSesion)="desconectarUsuario()"
  *ngIf="estaAutenticado" [class.hidden]="modalActivo"
></app-navbar>

<router-outlet></router-outlet>
