<div class="reportes-shell">
  <!-- Submenu de navegación -->
  <nav class="submenu-nav">
    <a class="submenu-brand" routerLink="/reportes">📊 Reportes</a>
    <div class="submenu-links">
      @for (r of reportes; track r) {
        <a
          class="submenu-link"
          routerLink="{{ r.ruta }}"
          routerLinkActive="submenu-active"
          [routerLinkActiveOptions]="{ exact: true }">
          <span class="submenu-icono">{{ r.icono }}</span>
          <span class="submenu-texto">{{ r.nombre }}</span>
        </a>
      }
    </div>
  </nav>

  <!-- Contenido: menú principal o componente hijo -->
  <div class="reportes-content">
    <button class="btn-regresar" (click)="regresar()">← Regresar</button>
    <router-outlet></router-outlet>
  </div>
</div>
